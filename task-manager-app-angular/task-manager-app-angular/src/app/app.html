<div class="bg-slate-50 min-h-screen p-6">
  <div class="max-w-6xl mx-auto">
    <header class="mb-6">
      <h1 class="text-3xl font-bold text-slate-800">Gerenciador de Tarefas - Estudos</h1>
      <p class="text-slate-600 mt-1">Cards em 3 colunas: Para fazer, Em andamento, Concluidas.</p>
    </header>

    <div class="mb-6 flex items-center justify-between">
      <p class="text-slate-600">Adicione novas tarefas no botao +</p>
      <button
        type="button"
        aria-label="Adicionar tarefa"
        class="w-10 h-10 rounded-full bg-indigo-600 text-white flex items-center justify-center text-2xl hover:bg-indigo-700"
        (click)="openNewTaskForm()"
      >
        +
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <app-task-column
        title="Para fazer"
        status="todo"
        [tasks]="getTasksByStatus('todo')"
        (moveTask)="moveTask($event)"
        (deleteTask)="deleteTask($event)"
        (editTask)="openEditTaskForm($event)"
      ></app-task-column>

      <app-task-column
        title="Em andamento"
        status="doing"
        [tasks]="getTasksByStatus('doing')"
        (moveTask)="moveTask($event)"
        (deleteTask)="deleteTask($event)"
        (editTask)="openEditTaskForm($event)"
      ></app-task-column>

      <app-task-column
        title="Concluidas"
        status="done"
        [tasks]="getTasksByStatus('done')"
        (moveTask)="moveTask($event)"
        (deleteTask)="deleteTask($event)"
        (editTask)="openEditTaskForm($event)"
      ></app-task-column>
    </div>

    <app-task-form
      *ngIf="showForm()"
      [task]="taskEditing()"
      (save)="saveTask($event)"
      (cancel)="closeForm()"
    ></app-task-form>
  </div>
</div>

<div class="fixed inset-0 z-40 flex items-center justify-center">
  <div class="absolute inset-0 bg-black/40" (click)="onCancel()"></div>
  <div class="relative bg-white rounded-lg shadow-lg w-full max-w-2xl mx-4 p-6 z-50">
    <div class="flex items-start justify-between mb-4">
      <h3 class="text-lg font-semibold">{{ task() ? 'Editar tarefa' : 'Nova tarefa' }}</h3>
      <button type="button" class="text-slate-500 hover:text-slate-800" (click)="onCancel()">
        X
      </button>
    </div>

    <form class="grid grid-cols-1 md:grid-cols-3 gap-3 items-end" (ngSubmit)="onSubmit()">
      <div>
        <label class="text-sm text-slate-700">Titulo</label>
        <input [(ngModel)]="title" name="title" required class="w-full mt-1 p-2 border rounded" />
      </div>
      <div>
        <label class="text-sm text-slate-700">Data termino</label>
        <input
          [(ngModel)]="due"
          name="due"
          type="date"
          required
          class="w-full mt-1 p-2 border rounded"
        />
      </div>
      <div>
        <label class="text-sm text-slate-700">Nivel</label>
        <select [(ngModel)]="level" name="level" class="w-full mt-1 p-2 border rounded">
          <option value="low">Baixo</option>
          <option value="medium">Medio</option>
          <option value="high">Alto</option>
        </select>
      </div>
      <div class="md:col-span-3">
        <label class="text-sm text-slate-700">Descricao</label>
        <textarea
          [(ngModel)]="desc"
          name="desc"
          rows="2"
          class="w-full mt-1 p-2 border rounded"
        ></textarea>
      </div>
      <div class="md:col-span-3 text-right">
        <button
          type="submit"
          class="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700"
        >
          Salvar tarefa
        </button>
      </div>
    </form>
  </div>
</div>
